<!DOCTYPE html>
<html>

<head>

<title>Happiest Birthday Pagal Ladki ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
text-align:center;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#A3B18A,#CFE1B9,#E8F0E1);
height:100vh;
overflow:hidden;
color:#2f3b2f;
}

/* fairy lights */

.lights{
position:fixed;
width:100%;
height:100%;
pointer-events:none;

background-image:
radial-gradient(#ffd84d 2px, transparent 2px),
radial-gradient(#ffcc33 2px, transparent 2px),
radial-gradient(#ffe680 2px, transparent 2px);

background-size:120px 120px;
opacity:0.8;

animation:twinkle 5s infinite alternate;
}

@keyframes twinkle{
0%{opacity:0.5}
100%{opacity:0.9}
}

/* balloons */

#balloon-container{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
}

.balloon{
width:36px;
height:50px;
border-radius:50%;
position:absolute;
animation:sway 4s ease-in-out infinite alternate;
}

.balloon::after{
content:"";
position:absolute;
width:2px;
height:65px;
background:#555;
top:50px;
left:50%;
transform:translateX(-50%);
}

@keyframes sway{
0%{transform:translateX(-10px)}
100%{transform:translateX(10px)}
}

/* main content */

.landing-container{
position:relative;
z-index:10;
margin-top:20px;
}

h1{
font-family:'Playfair Display',serif;
font-size:60px;
}

.message{
font-size:18px;
max-width:460px;
margin:auto;
line-height:1.6;
font-style:italic;
}

/* cake */

.cake{
width:170px;
margin:20px auto;
cursor:pointer;
}

.layer{
height:32px;
border-radius:10px;
margin:4px auto;
}

.top{width:105px;background:#e8c8a0;}
.middle{width:135px;background:#d9b38c;}
.bottom{width:170px;background:#cfa77b;}

.candles{
display:flex;
justify-content:center;
gap:8px;
margin-bottom:4px;
}

.candle{
width:6px;
height:24px;
background:white;
position:relative;
}

.flame{
width:7px;
height:10px;
background:orange;
border-radius:50%;
position:absolute;
top:-10px;
left:0;
animation:flicker 1s infinite;
}

@keyframes flicker{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* buttons */

.icon-buttons button{
font-size:24px;
width:54px;
height:54px;
border-radius:50%;
border:none;
margin:8px;
cursor:pointer;
background:#556B4F;
color:white;
}

</style>

</head>

<body>

<div class="lights"></div>

<div id="balloon-container"></div>

<div class="landing-container">

<h1>Happiest Birthday<br>Pagal Ladki ❤️</h1>

<p class="message">
Thank you for always being my support system.<br>
Thank you for being my home.<br>
I love you so so much.<br>
To infinity and beyond.
</p>

<div class="cake" onclick="blowCandles()">

<div class="candles">
<div class="candle"><div class="flame"></div></div>
<div class="candle"><div class="flame"></div></div>
<div class="candle"><div class="flame"></div></div>
</div>

<div class="layer top"></div>
<div class="layer middle"></div>
<div class="layer bottom"></div>

</div>

<div class="icon-buttons">

<button onclick="startExperience()">🎉</button>
<button>💌</button>

</div>

</div>

<audio id="music" loop>
<source src="assets/music/outofmyleague.mp3" type="audio/mpeg">
</audio>

<script>

/* CONFETTI + MUSIC */

function startExperience(){

document.getElementById("music").play();

confetti({
particleCount:300,
spread:120,
origin:{y:0.6}
});

}

/* CAKE BLOW */

function blowCandles(){

document.querySelectorAll('.flame').forEach(f=>{
f.style.display='none';
});

confetti({
particleCount:500,
spread:180,
origin:{y:0.6}
});

}

/* BALLOONS */

window.onload=function(){

const colors=[
"#ff6b6b","#ffd93d","#6bcB77","#4d96ff",
"#c77dff","#ff8fab","#7bdff2","#ffa94d"
];

function createBalloon(){

const balloon=document.createElement("div");
balloon.className="balloon";

balloon.style.background=
colors[Math.floor(Math.random()*colors.length)];

balloon.style.left=Math.random()*100+"vw";

if(Math.random()>0.5){
balloon.style.top="-80px";
}else{
balloon.style.bottom="-80px";
}

const duration=8+Math.random()*7;

balloon.animate([
{transform:"translateY(0)"},
{transform:"translateY(-120vh)"}
],{
duration:duration*1000,
iterations:Infinity
});

document.getElementById("balloon-container").appendChild(balloon);

}

for(let i=0;i<14;i++){
createBalloon();
}

}

</script>

</body>

</html>
