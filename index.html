<!DOCTYPE html>
<html>
<head>

<title>Happiest Birthday Pagal Ladki ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
font-family:Arial;
text-align:center;
background:#A3B18A;
color:white;
margin-top:80px;
}

h1{
font-size:48px;
}

p{
font-size:20px;
}

.cake{
font-size:80px;
cursor:pointer;
margin:40px;
}

#wishText{
opacity:0;
font-size:26px;
transition:1s;
}

#wishText.show{
opacity:1;
}

.buttons{
margin-top:40px;
}

button{
font-size:30px;
padding:15px 30px;
margin:15px;
cursor:pointer;
border:none;
border-radius:10px;
}
</style>

</head>

<body>

<h1>Happiest Birthday Pagal Ladki ❤️</h1>

<p>
Thank you for always being my support system.<br>
Thank you for being my home.<br>
I love you so so much.<br>
To infinity and beyond.
</p>

<div class="cake" onclick="blowCandles()">🎂</div>

<p id="wishText">Make a wish Pagalll ✨✨</p>

<div class="buttons">

<button onclick="startExperience()">🎉</button>

<button onclick="alert('Notes coming soon 💌')">💌</button>

</div>

<audio id="music" loop>
<source src="assets/music/outofmyleague.mp3" type="audio/mpeg">
</audio>

<script>

function startExperience(){

alert("Button clicked!");

const music = document.getElementById("music");

if(music){
music.play().catch(()=>{});
}

confetti({
particleCount:300,
spread:120
});

}

function blowCandles(){
document.getElementById("wishText").classList.add("show");

confetti({
particleCount:500,
spread:180
});
}

</script>

</body>
</html>
