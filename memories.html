<!DOCTYPE html>
<html>

<head>
<title>Memories 📸</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="memoryMusic" loop>
<source src="assets/music/nothing.mp3" type="audio/mpeg">
</audio>

<h1>These are and will always be my most favourite memories 🧿❤️</h1>

<div class="heart-gallery">

<img src="assets/music/1.jpeg" class="heart-photo p1">
<img src="assets/music/2.jpeg" class="heart-photo p2">
<img src="assets/music/3.jpeg" class="heart-photo p3">

</div>

<p class="click-text">Click the center ❤️</p>

<div id="photoWall">

<div class="string-row">

<div class="polaroid">
<img src="assets/music/8.jpeg">
<p>One of those moments that stayed.</p>
</div>

<div class="polaroid">
<img src="assets/music/9.jpeg">
</div>

<div class="polaroid">

</div>

<div class="polaroid">
<img src="assets/music/11.jpeg">
</div>

<div class="polaroid">

</div>

</div>

<div class="string-row">

<div class="polaroid">
<img src="assets/music/13.jpeg">

</div>

<div class="polaroid">

<div class="polaroid">

</div>

<div class="polaroid">
<img src="assets/music/17.jpeg">
</div>

<div class="polaroid">
<img src="assets/music/18.jpeg">
</div>

<div class="polaroid">
<img src="assets/music/19.jpeg">
<p>And this too.</p>
</div>

</div>

</div>

<script>
function showWall(){

document.getElementById("photoWall").classList.add("show");

const music = document.getElementById("memoryMusic");

if(music){
music.play().catch(()=>{});
}

}
</script>

</body>

</html>
