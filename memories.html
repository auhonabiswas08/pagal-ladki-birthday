<!DOCTYPE html>
<html>

<head>
<title>Memories 📸</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="memoryMusic" loop>
<source src="assets/music/nothing.mp3" type="audio/mpeg">
</audio>

<h1 class="memory-title">These are and will always be my most favourite memories ❤️🧿</h1>

<div class="heart-gallery">

<img src="assets/music/1.jpeg.jpeg" class="heart-photo p1 crop-one">
<img src="assets/music/2.jpeg.jpeg" class="heart-photo p2">
<img src="assets/music/3.jpeg.jpeg" class="heart-photo p3">
<img src="assets/music/4.jpeg.jpeg" class="heart-photo p4">

<img src="assets/music/5.jpeg.jpeg" class="heart-photo center" onclick="showWall()">

<img src="assets/music/6.jpeg.jpeg" class="heart-photo p5">
<img src="assets/music/7.jpeg.jpeg" class="heart-photo p6">

</div>

<p class="click-text">Click the center ❤️</p>

<div id="photoWall">

<div class="string-row">

<div class="polaroid">
<img src="assets/music/8.jpeg.jpeg">
<p>One of those moments that stayed.</p>
</div>

<div class="polaroid">
<img src="assets/music/9.jpeg.jpeg" class="crop-nine-final">
</div>

<div class="polaroid">
<img src="assets/music/10.jpeg.jpeg">
<p>I still remember how light this felt.</p>
</div>

<div class="polaroid">
<img src="assets/music/11.jpeg.jpeg">
</div>

<div class="polaroid">
<img src="assets/music/12.jpeg.jpeg">
</div>

</div>

<div class="string-row">

<div class="polaroid">
<img src="assets/music/13.jpeg.jpeg">
<p>This had to be here.</p>
</div>

<div class="polaroid">
<img src="assets/music/14.jpeg.jpeg">
</div>

<div class="polaroid">
<img src="assets/music/15.jpeg.jpeg">
</div>

<div class="polaroid">
<img src="assets/music/16.jpeg.jpeg" class="crop-sixteen">
<p>No particular reason, still important.</p>
</div>

<div class="polaroid">
<img src="assets/music/17.jpeg.jpeg" class="crop-down">
</div>

<div class="polaroid">
<img src="assets/music/18.jpeg.jpeg">
</div>

<div class="polaroid">
<img src="assets/music/19.jpeg.jpeg">
<p>And this too.</p>
</div>

</div>

</div>

<script>
function showWall(){

document.getElementById("photoWall").classList.add("show");

const music = document.getElementById("memoryMusic");

music.currentTime = 0;
music.play();

}
</script>

</body>

</html>
